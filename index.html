<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>My Image Gallery</h1>

<div class="filters">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
</div>


<div class="gallery">

    <img src="images/flower-gardens.jpg" class="nature" onclick="openImage(this)">
    
    <img src="images/city.jpg" class="city" onclick="openImage(this)">
    
    <img src="images/garden.jpg" class="nature" onclick="openImage(this)">
    
    <img src="images/buildings.jpg" class="city" onclick="openImage(this)">

</div>


<div id="lightbox">
    <span onclick="closeImage()">×</span>
    <img id="bigImage">
    
    <button onclick="prevImage()">Previous</button>
    <button onclick="nextImage()">Next</button>
</div>


<script src="script.js"></script>

</body>
</html>
